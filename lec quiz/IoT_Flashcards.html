    <option value="multi">Multiple Choice</option>

    <option value="numerical">Numerical</option>

    <option value="new">Unseen Only</option>

</div>

<div class="main">

  <div class="assessment" id="assessmentBtns" style="display:none">

  </div>

  <div style="height: 16px"></div>

  <div class="nav-row">

    <span class="nav-num" id="navNum">1 / 0</span>
    <button class="nav-btn nav-next" onclick="next()">›</button>
  </div>
</div>

// State
let questions = [...ALL_QUESTIONS];
let currentIndex = 0;
let isFlipped = false;
let known = new Set();
let needsReview = new Set();
let shuffled = false;
let filterWeek = 'all';
let filterType = 'all';
let filterStatus = 'all';

function getFiltered() {
  return ALL_QUESTIONS.filter((q, i) => {
    if (filterWeek !== 'all' && q.week !== filterWeek) return false;
    if (filterType !== 'all' && q.type !== filterType) return false;
    if (filterStatus === 'review' && !needsReview.has(i)) return false;
    if (filterStatus === 'new' && (known.has(i) || needsReview.has(i))) return false;
    return true;
  }).map((q, _, arr) => ({...q, origIdx: ALL_QUESTIONS.indexOf(q)}));
}

function init() {
  // Populate week filter
  const weeks = [...new Set(ALL_QUESTIONS.map(q => q.week))];
  const sel = document.getElementById('weekFilter');
  weeks.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w; opt.textContent = w;
    sel.appendChild(opt);
  });
  document.getElementById('weekFilter').onchange = applyFilter;
  document.getElementById('typeFilter').onchange = applyFilter;
  document.getElementById('statusFilter').onchange = applyFilter;
  document.getElementById('totalCount').textContent = ALL_QUESTIONS.length;
  applyFilter();
}

function applyFilter() {
  filterWeek = document.getElementById('weekFilter').value;
  filterType = document.getElementById('typeFilter').value;
  filterStatus = document.getElementById('statusFilter').value;
  questions = getFiltered();
  if (shuffled) questions = questions.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  isFlipped = false;
  renderCard();
}

function shuffle() {
  shuffled = !shuffled;
  if (shuffled) questions = questions.sort(() => Math.random() - 0.5);
  else applyFilter();
  currentIndex = 0;
  isFlipped = false;
  renderCard();
}

function resetProgress() {
  known.clear();
  needsReview.clear();
  updateStats();
  applyFilter();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardWrap').classList.toggle('flipped', isFlipped);
  document.getElementById('assessmentBtns').style.display = isFlipped ? 'flex' : 'none';
}

function prev() {
  if (currentIndex > 0) { currentIndex--; isFlipped = false; document.getElementById('cardWrap').classList.remove('flipped'); document.getElementById('assessmentBtns').style.display = 'none'; renderCard(); }
}

function next() {
  if (currentIndex < questions.length - 1) { currentIndex++; isFlipped = false; document.getElementById('cardWrap').classList.remove('flipped'); document.getElementById('assessmentBtns').style.display = 'none'; renderCard(); }
}

function markKnown() {
  if (questions[currentIndex]) { known.add(questions[currentIndex].origIdx); needsReview.delete(questions[currentIndex].origIdx); updateStats(); next(); }
}

function markReview() {
  if (questions[currentIndex]) { needsReview.add(questions[currentIndex].origIdx); known.delete(questions[currentIndex].origIdx); updateStats(); next(); }
}

function updateStats() {
  document.getElementById('knownCount').textContent = known.size;
  document.getElementById('reviewCount').textContent = needsReview.size;
  document.getElementById('remainCount').textContent = ALL_QUESTIONS.length - known.size - needsReview.size;
}

const TYPE_LABELS = { tf: 'True/False', multi: 'Multi-select', numerical: 'Numerical', single: 'Single choice' };
const TYPE_CLASS = { tf: 'badge-tf', multi: 'badge-multi', numerical: 'badge-num', single: 'badge-single' };

function renderCard() {
  if (questions.length === 0) {
    document.getElementById('cardFront').innerHTML = '<div class="card-question" style="text-align:center;width:100%;">No questions match your filters.</div>';
    document.getElementById('cardBack').innerHTML = '';
    document.getElementById('navNum').textContent = '0 / 0';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '0 questions';
    return;
  }
  const q = questions[currentIndex];
  const progress = Math.round(((currentIndex + 1) / questions.length) * 100);
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('navNum').textContent = `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('progressText').textContent = `${questions.length} questions`;

  // Front
  document.getElementById('cardFront').innerHTML = `
    <div class="card-week">${q.week} <span class="card-type-badge ${TYPE_CLASS[q.type]}">${TYPE_LABELS[q.type]}</span></div>
    <div class="card-question">${q.q}</div>
    <div class="card-hint">👆 Click to reveal answer</div>
  `;

  // Back — show all options with correct ones highlighted
  const optsHtml = q.options.map(opt => {
    const isCorrect = q.answer.includes(opt);
    return `<div class="opt ${isCorrect ? 'opt-correct' : 'opt-wrong'}">${isCorrect ? '✓ ' : '✗ '}${opt}</div>`;
  }).join('');

  document.getElementById('cardBack').innerHTML = `
    <div class="card-answer-label">✅ Answer</div>
    <div class="options-grid">${optsHtml}</div>
  `;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === 'k' || e.key === 'K') { if (isFlipped) markKnown(); }
  else if (e.key === 'r' || e.key === 'R') { if (isFlipped) markReview(); }
});

init();
updateStats();
</script>
